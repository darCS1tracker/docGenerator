<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Print Document - DAR DMS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="db.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    
    <style>
        /* Base styling */
        body { 
            font-family: 'Roboto', sans-serif; 
            font-size: 11pt; 
            background-color: #f3f4f6; 
            color: black;
            margin: 0;
        }
        
        /* The on-screen paper preview */
        .page { 
            background-color: white; 
            margin: 4rem auto; 
            box-sizing: border-box; 
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); 
            display: flex;
            flex-direction: column;
            position: relative;
            /* Top 1.25in, Right 1in, Bottom 1in, Left 1in */
            padding: 1.25in 1in 1in 1in;
            z-index: 1;
        }

        /* Enforce absolute background image so it ALWAYS prints */
        #print-bg-image {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            object-fit: fill; /* Stretches exactly to paper bounds */
            display: none;
        }

        /* Content layer keeps everything above the background */
        .content-layer {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        /* Intelligent Paging Rules */
        .avoid-break { page-break-inside: avoid; break-inside: avoid; }
        
        /* Exact layout grids */
        .doc-header-grid { 
            display: grid; 
            grid-template-columns: 80px 20px 1fr; 
            row-gap: 1rem; 
            margin-bottom: 1.5rem; 
        }
        
        /* Document Body Paragraphs - Enforcing Double Space */
        p, .prose p, .prose span { 
            orphans: 3; 
            widows: 3; 
            margin-bottom: 1.5rem !important; 
            text-align: justify; 
            font-size: 11pt !important;
            line-height: 1.5;
        }

        hr.divider {
            border: 0;
            border-top: 2px solid black;
            margin-bottom: 2rem;
        }

        /* Dynamic Print Rules - Hides browser metadata natively */
        @media print {
            body { background-color: white; }
            .page { 
                margin: 0; 
                box-shadow: none; 
                width: 100% !important; 
                min-height: auto !important; 
            }
            #print-ui-controls { display: none !important; }
        }
    </style>
    <style id="dynamic-page-style"></style>
</head>
<body>

    <div id="print-ui-controls" class="fixed top-0 left-0 right-0 bg-slate-800 text-white p-3 flex justify-between items-center z-50 shadow-md">
        <div class="flex items-center space-x-4">
            <span class="font-bold text-sm">Paper Size:</span>
            <select id="paper-size" onchange="updatePaperSize()" class="bg-slate-700 text-white border border-slate-600 rounded px-2 py-1 outline-none focus:ring-2 focus:ring-blue-500 text-sm">
                <option value="long">Long / Folio (8.5" x 13")</option>
                <option value="a4">A4 (8.27" x 11.69")</option>
            </select>
        </div>
        <div class="flex space-x-3">
            <button onclick="window.history.back()" class="bg-slate-600 px-4 py-1.5 rounded hover:bg-slate-500 transition font-bold text-sm">Back</button>
            <button onclick="window.print()" class="bg-blue-600 px-4 py-1.5 rounded hover:bg-blue-500 transition font-bold text-sm flex items-center">
                <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z"></path></svg>
                Print Document
            </button>
        </div>
    </div>

    <div class="page" id="document-paper">
        <img id="print-bg-image" src="" alt="Background">

        <div class="content-layer">
            <div id="doc-header" class="avoid-break mb-4">
                <!-- Header injected via JS -->
            </div>

            <div id="doc-body" class="flex-grow prose max-w-none mt-4">
                <p class="text-gray-500 text-center mt-10">Loading document...</p>
            </div>

            <!-- Footer Area: Stacked Vertically -->
            <div class="mt-auto flex flex-col items-start avoid-break pb-4" id="doc-footer" style="display: none;">
                
                <!-- Top: Signatory -->
                <div class="relative pt-8 mb-8">
                    <img src="esign.png" alt="" class="absolute top-0 left-4 h-16 opacity-90 z-10" onerror="this.style.display='none'">
                    <p class="font-bold uppercase mb-0 relative z-20" style="font-size: 11pt; margin-bottom: 0 !important;">RICARDO C. GARCIA</p>
                    <p class="relative z-20" style="font-size: 11pt; margin-bottom: 0 !important;">Provincial Agrarian Reform Program Officer II</p>
                </div>

                <!-- Bottom: Horizontal QR Block underneath the Signatory -->
                <div class="flex items-center" style="font-family: Arial, Helvetica, sans-serif;">
                    
                    <!-- QR Code directly on the left -->
                    <div id="qrcode" class="mr-3" style="flex-shrink: 0;"></div>
                    
                    <!-- Formatted text directly on the right -->
                    <div class="text-left" style="line-height: 1.3;">
                        <p class="font-bold m-0" style="font-size: 9pt; color: #1e293b;">Department of Agrarian Reform</p>
                        <p class="m-0" style="font-size: 8pt; color: #334155;">Provincial Office of Camarines Sur 1</p>
                        <p class="italic m-0" style="font-size: 8pt; color: #475569;">Office of the Provincial Director</p>
                    </div>

                </div>
            </div>
        </div>
    </div>

    <script>
        function updatePaperSize() {
            const size = document.getElementById('paper-size').value;
            const paper = document.getElementById('document-paper');
            const styleTag = document.getElementById('dynamic-page-style');
            const bgImgElement = document.getElementById('print-bg-image');
            
            // Generate Supabase storage URL dynamically based on size
            const bgFileName = size === 'long' ? 'bg_memo.jpg' : 'bg_memo_a4.jpg';
            
            // Fetch Background Image from Storage
            const { data: bgData } = window.supabaseClient.storage.from('images').getPublicUrl(bgFileName);
            
            if (bgData && bgData.publicUrl) {
                bgImgElement.src = bgData.publicUrl;
                bgImgElement.style.display = 'block';
            } else {
                bgImgElement.style.display = 'none';
            }

            let css = "";
            if (size === 'long') {
                paper.style.width = '8.5in';
                paper.style.minHeight = '13in';
                // margin: 0 strictly removes browser-injected header/footer metadata!
                css = `@page { size: 8.5in 13in; margin: 0; }`; 
            } else if (size === 'a4') {
                paper.style.width = '8.27in';
                paper.style.minHeight = '11.69in';
                css = `@page { size: A4; margin: 0; }`;
            }
            styleTag.innerHTML = css;
        }

        // AUTO-FORMATTER
        function formatHeaderValue(val, isSubjectOrDate = false) {
            if (!val) return "";
            let cleanString = val.replace(/<br\s*\/?>/gi, '\n').replace(/<\/?[^>]+(>|$)/g, "");
            let lines = cleanString.split('\n');
            
            if (isSubjectOrDate) {
                return `<b class="uppercase">${lines.join('<br>')}</b>`;
            } else {
                if (lines.length > 0) {
                    lines[0] = `<b class="uppercase">${lines[0]}</b>`;
                }
                return lines.join('<br>');
            }
        }

        function makeGridRow(label, value, isSubjectOrDate = false) {
            let safeValue = value || " "; 
            let formattedValue = formatHeaderValue(safeValue, isSubjectOrDate);
            
            return `
                <div class="font-bold uppercase">${label}</div>
                <div class="font-bold">:</div>
                <div>${formattedValue}</div>
            `;
        }

        document.addEventListener('DOMContentLoaded', async () => {
            updatePaperSize();

            const urlParams = new URLSearchParams(window.location.search);
            const docId = urlParams.get('doc_id');

            if (!docId) {
                document.getElementById('doc-body').innerHTML = "<p class='text-red-500 font-bold'>Error: No Document ID provided.</p>";
                return;
            }

            const { data: doc, error } = await window.supabaseClient
                .from('documents')
                .select('*')
                .eq('doc_id', docId)
                .single();

            if (error || !doc) {
                document.getElementById('doc-body').innerHTML = `<p class='text-red-500 font-bold'>Error loading document.</p>`;
                return;
            }

            const meta = doc.content_data || {};
            let headerHtml = "";
            
            const finalSubject = meta.subject || doc.title || "";
            const finalDate = meta.date ? formatDate(meta.date) : formatDate(doc.created_at);

            switch (doc.doc_type) {
                case 'MEMO_INTERNAL':
                case 'MEMO_EXTERNAL':
                    headerHtml += `<h2 class="font-bold mb-8 uppercase" style="font-size: 14pt;">MEMORANDUM</h2>`;
                    headerHtml += `<div class="doc-header-grid">`;
                    headerHtml += makeGridRow("TO", meta.to);
                    headerHtml += makeGridRow("FROM", meta.from);
                    headerHtml += makeGridRow("DATE", finalDate, true); 
                    headerHtml += makeGridRow("SUBJECT", finalSubject, true); 
                    headerHtml += `</div><hr class="divider">`;
                    break;

                case 'ADVISORY':
                    headerHtml += `<h2 class="font-bold mb-8 uppercase" style="font-size: 14pt;">ADVISORY</h2>`;
                    headerHtml += `<div class="doc-header-grid">`;
                    headerHtml += makeGridRow("FOR", meta.for);
                    headerHtml += makeGridRow("FROM", meta.from);
                    headerHtml += makeGridRow("SUBJECT", finalSubject, true);
                    headerHtml += `</div><hr class="divider">`;
                    break;

                case 'NOTICE_OF_MEETING':
                    headerHtml += `<h2 class="font-bold mb-8 text-center underline uppercase" style="font-size: 14pt;">NOTICE OF MEETING</h2>`;
                    headerHtml += `<div class="doc-header-grid">`;
                    headerHtml += makeGridRow("TO", meta.to);
                    headerHtml += makeGridRow("FROM", meta.from);
                    headerHtml += makeGridRow("SUBJECT", finalSubject, true);
                    headerHtml += makeGridRow("DATE", finalDate, true);
                    headerHtml += `</div><hr class="divider">`;
                    break;

                case 'PSO':
                    headerHtml += `<h2 class="font-bold uppercase" style="font-size: 12pt;">PROVINCIAL SPECIAL ORDER No. ________</h2>`;
                    headerHtml += `<h2 class="font-bold mb-8 uppercase" style="font-size: 12pt;">SERIES OF ${new Date().getFullYear()}</h2>`;
                    headerHtml += `<div class="flex mb-4"><span class="font-bold mr-4">SUBJECT:</span> <span class="font-bold uppercase flex-1">${finalSubject.replace(/\n/g, '<br>')}</span></div>`;
                    headerHtml += `<hr class="divider">`;
                    break;

                case 'CERT_JUST':
                    headerHtml += `<h2 class="font-bold mb-2 text-center uppercase" style="font-size: 18pt;">${doc.title || 'JUSTIFICATION'}</h2>`;
                    if (meta.subtitle) headerHtml += `<p class="text-center mb-6 font-bold" style="font-size:10pt;">${meta.subtitle.replace(/\n/g, '<br>')}</p>`;
                    break;

                case 'LETTER':
                    headerHtml += `<p class="mb-6">${finalDate}</p>`;
                    if (meta.to) {
                        headerHtml += `<div class="mb-6">${formatHeaderValue(meta.to)}</div>`;
                    }
                    if (meta.thru) {
                        headerHtml += `<div class="flex mb-6"><span class="mr-8 uppercase">THRU:</span> <div class="flex-1">${formatHeaderValue(meta.thru)}</div></div>`;
                    }
                    if (meta.attention) {
                        headerHtml += `<div class="mb-6 flex"><span>ATTENTION:</span><span class="w-4 shrink-0"></span><div class="flex-1">${formatHeaderValue(meta.attention, true)}</div></div>`;
                    }
                    headerHtml += `<p class="mb-6">Sir/Madam:</p>`;
                    break;
            }

            document.getElementById('doc-header').innerHTML = headerHtml;
            document.getElementById('doc-body').innerHTML = meta.body || '<p>No content provided.</p>';
            
            document.getElementById('doc-footer').style.display = 'flex';
            
            const verifyUrl = `${window.location.origin}${window.location.pathname.replace('print.html', '')}verify.html?doc_id=${docId}`;
            
            // Render perfectly compact formal QR Code (60x60 dimensions)
            new QRCode(document.getElementById("qrcode"), {
                text: verifyUrl, 
                width: 60, 
                height: 60, 
                colorDark : "#000000", 
                colorLight : "#ffffff", 
                correctLevel : QRCode.CorrectLevel.M
            });

            setTimeout(() => { window.print(); }, 800);
        });

        function formatDate(dateString) {
            if(!dateString) return "";
            const options = { year: 'numeric', month: 'long', day: 'numeric' };
            return new Date(dateString).toLocaleDateString('en-US', options);
        }
    </script>
</body>
</html>
