<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - DAR DMS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="db.js"></script>
</head>
<body class="bg-gray-100 font-sans flex items-center justify-center h-screen">

    <div class="w-full max-w-md bg-white p-8 shadow-lg rounded-lg">
        <h2 class="text-3xl font-bold mb-2 text-gray-800 text-center">DAR DMS</h2>
        <p class="text-gray-500 mb-6 text-center text-sm">Sign in to your account</p>
        
        <form id="login-form" class="space-y-5">
            <div>
                <label class="block text-sm font-medium text-gray-700">Email Address</label>
                <input type="email" id="email" required class="mt-1 block w-full border-gray-300 rounded-md shadow-sm p-3 border bg-gray-50 focus:bg-white focus:ring-blue-500" placeholder="you@example.com" />
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">Password</label>
                <input type="password" id="password" required class="mt-1 block w-full border-gray-300 rounded-md shadow-sm p-3 border bg-gray-50 focus:bg-white focus:ring-blue-500" placeholder="••••••••" />
            </div>
            
            <button type="submit" id="login-btn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded transition">
                Sign In
            </button>
            <p id="login-msg" class="text-sm font-bold text-red-600 hidden text-center mt-3"></p>
        </form>
    </div>

    <script>
        // Redirect if already logged in
        window.addEventListener('load', async () => {
            const { data: { session } } = await window.supabaseClient.auth.getSession();
            if (session) window.location.href = 'index.html';
        });

        // Login Submission
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('login-btn');
            const msg = document.getElementById('login-msg');
            
            btn.innerText = "Signing in...";
            btn.disabled = true;
            msg.classList.add('hidden');

            const { data, error } = await window.supabaseClient.auth.signInWithPassword({
                email: document.getElementById('email').value,
                password: document.getElementById('password').value,
            });

            if (error) {
                msg.innerText = error.message;
                msg.classList.remove('hidden');
                btn.innerText = "Sign In";
                btn.disabled = false;
            } else {
                window.location.href = 'index.html'; 
            }
        });
    </script>
</body>
</html>
