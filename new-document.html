<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Document - DAR DMS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tinymce/6.8.2/tinymce.min.js"></script>
    
    <script src="db.js"></script>
    <script src="sidebar.js"></script>
</head>
<body class="bg-gray-100 font-sans flex h-screen hidden" id="page-body">

    <aside id="sidebar-container" class="w-64 bg-slate-900 text-white flex flex-col hidden md:flex"></aside>

    <main class="flex-1 overflow-y-auto p-8">
        <div class="max-w-5xl mx-auto bg-white p-8 shadow-md rounded-lg">
            <h2 class="text-2xl font-bold mb-6 text-gray-800">Create New Document</h2>
            
            <form id="document-form" class="space-y-6">
                <div class="w-full md:w-1/2">
                    <label class="block text-sm font-medium text-gray-700">Document Type</label>
                    <select id="doc_type" required class="mt-1 block w-full border-gray-300 rounded-md shadow-sm p-2 border bg-white">
                        <option value="" disabled selected>Select a document type...</option>
                        <option value="CERT_JUST">Certification / Justification</option>
                        <option value="MEMO_INTERNAL">Memorandum (Internal - TO)</option>
                        <option value="MEMO_EXTERNAL">Memorandum (External - FOR)</option>
                        <option value="PSO">Provincial Special Order (PSO)</option>
                        <option value="NOTICE_OF_MEETING">Notice of Meeting</option>
                        <option value="ADVISORY">Advisory</option>
                        <option value="LETTER">Letter</option>
                    </select>
                </div>

                <div id="dynamic-fields" class="grid grid-cols-1 md:grid-cols-2 gap-6 bg-gray-50 p-4 rounded border hidden">
                    <div id="field-to" class="dyn-field hidden col-span-1 md:col-span-2">
                        <label class="block text-sm font-medium text-gray-700">TO (Addressee/s)</label>
                        <textarea id="meta_to" rows="2" class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm p-2" placeholder="Name, Title, Office..."></textarea>
                    </div>
                    <div id="field-for" class="dyn-field hidden col-span-1 md:col-span-2">
                        <label class="block text-sm font-medium text-gray-700">FOR</label>
                        <input type="text" id="meta_for" class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm p-2" />
                    </div>
                    <div id="field-thru" class="dyn-field hidden">
                        <label class="block text-sm font-medium text-gray-700">THRU</label>
                        <input type="text" id="meta_thru" class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm p-2" />
                    </div>
                    <div id="field-attention" class="dyn-field hidden">
                        <label class="block text-sm font-medium text-gray-700">ATTENTION</label>
                        <input type="text" id="meta_attention" class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm p-2" />
                    </div>
                    <div id="field-from" class="dyn-field hidden">
                        <label class="block text-sm font-medium text-gray-700">FROM</label>
                        <input type="text" id="meta_from" class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm p-2" value="RICARDO C. GARCIA" />
                    </div>
                    <div id="field-date" class="dyn-field hidden">
                        <label class="block text-sm font-medium text-gray-700">DATE</label>
                        <input type="date" id="meta_date" class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm p-2" />
                    </div>
                    <div id="field-subject" class="dyn-field hidden col-span-1 md:col-span-2">
                        <label class="block text-sm font-medium text-gray-700">SUBJECT / TITLE</label>
                        <input type="text" id="meta_subject" class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm p-2" />
                    </div>
                    <div id="field-subtitle" class="dyn-field hidden col-span-1 md:col-span-2">
                        <label class="block text-sm font-medium text-gray-700">SUBTITLE</label>
                        <input type="text" id="meta_subtitle" class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm p-2" />
                    </div>
                </div>

                <div id="editor-container" class="hidden">
                    <label class="block text-sm font-medium text-gray-700 mb-2">Document Body</label>
                    <textarea id="body_content"></textarea>
                </div>

                <div class="flex items-center justify-end space-x-4 pt-4 border-t">
                    <span id="form-msg" class="text-sm font-bold hidden"></span>
                    <button type="submit" id="submit-btn" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-6 rounded transition hidden">
                        Save Document
                    </button>
                </div>
            </form>
        </div>
    </main>

    <script>
        let currentUser = null;

        // 1. Check Auth and Init Editor
        document.addEventListener('DOMContentLoaded', async () => {
            const { data: { session } } = await window.supabaseClient.auth.getSession();
            
            if (!session) {
                window.location.href = 'login.html';
                return;
            }
            
            currentUser = session.user;
            document.getElementById('page-body').classList.remove('hidden');

            tinymce.init({
                selector: '#body_content',
                height: 500,
                menubar: false,
                plugins: ['advlist', 'lists', 'table'],
                toolbar: 'undo redo | bold italic | alignleft aligncenter alignright alignjustify | table | bullist numlist',
                promotion: false, branding: false   
            });
        });

        // 2. Dynamic Form Logic
        document.getElementById('doc_type').addEventListener('change', function(e) {
            const type = e.target.value;
            document.getElementById('dynamic-fields').classList.remove('hidden');
            document.getElementById('editor-container').classList.remove('hidden');
            document.getElementById('submit-btn').classList.remove('hidden');
            document.querySelectorAll('.dyn-field').forEach(el => el.classList.add('hidden'));

            const showFields = (fields) => fields.forEach(f => document.getElementById(f).classList.remove('hidden'));

            switch(type) {
                case 'MEMO_INTERNAL': showFields(['field-to', 'field-from', 'field-subject', 'field-date']); break;
                case 'MEMO_EXTERNAL': showFields(['field-for', 'field-from', 'field-subject', 'field-date']); break;
                case 'NOTICE_OF_MEETING': showFields(['field-to', 'field-from', 'field-subject', 'field-date']); break;
                case 'ADVISORY': showFields(['field-for', 'field-from', 'field-subject']); break;
                case 'PSO': showFields(['field-subject']); break;
                case 'CERT_JUST': showFields(['field-subject', 'field-subtitle']); break;
                case 'LETTER': showFields(['field-to', 'field-thru', 'field-attention', 'field-subject', 'field-date']); break;
            }
        });

        // 3. Form Submission 
        document.getElementById('document-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const btn = document.getElementById('submit-btn');
            const msg = document.getElementById('form-msg');
            
            btn.innerText = "Saving...";
            btn.disabled = true;
            msg.classList.remove('hidden');

            const formattedContent = tinymce.get('body_content').getContent();
            let contentData = { body: formattedContent };
            
            const checkAndAdd = (fieldId, jsonKey) => {
                const el = document.getElementById(fieldId);
                const container = el.closest('.dyn-field');
                if (!container.classList.contains('hidden') && el.value.trim() !== '') {
                    contentData[jsonKey] = el.value.trim();
                }
            };

            ['to', 'for', 'from', 'date', 'thru', 'attention', 'subtitle'].forEach(key => checkAndAdd(`meta_${key}`, key));

            let docTitle = document.getElementById('meta_subject').value.trim();
            const typeSelected = document.getElementById('doc_type');
            if(!docTitle) docTitle = typeSelected.options[typeSelected.selectedIndex].text + " - Draft";
            else contentData['subject'] = docTitle;

            const docData = {
                title: docTitle,
                doc_type: typeSelected.value,
                status: 'DRAFT',
                content_data: contentData,
                creator_id: currentUser.id // Link the document to the logged-in user
            };

            try {
                const { error } = await window.supabaseClient.from('documents').insert([docData]);
                if (error) throw error;

                msg.innerText = "Document saved successfully!";
                msg.className = "text-sm font-bold text-green-600 block";
                
                setTimeout(() => window.location.href = 'index.html', 1500); // Send back to dashboard
            } catch (err) {
                console.error("DB ERROR:", err);
                msg.innerText = err.message || JSON.stringify(err);
                msg.className = "text-sm font-bold text-red-600 block";
                alert("Insert Failed: \n\n" + (err.message || "Check console"));
            } finally {
                btn.innerText = "Save Document";
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
