<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - DAR DMS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="db.js"></script>
    <script src="sidebar.js"></script>
</head>
<body class="bg-gray-100 font-sans flex h-screen hidden" id="page-body">

    <aside id="sidebar-container" class="w-64 bg-slate-900 text-white flex flex-col hidden md:flex"></aside>

    <main class="flex-1 overflow-y-auto p-8 relative">
        <div class="max-w-7xl mx-auto">
            
            <div class="flex justify-between items-center mb-8">
                <h2 class="text-3xl font-bold text-gray-800">Dashboard</h2>
                <a href="new-document.html" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded shadow transition">
                    + New Document
                </a>
            </div>

            <div class="mb-4 bg-white p-4 rounded-lg shadow-sm flex items-center">
                <div class="relative w-full md:w-1/2">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <svg class="h-5 w-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                    </div>
                    <input type="text" id="searchInput" placeholder="Search by subject, type, status, content, or date..." class="w-full pl-10 pr-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition">
                </div>
                <div class="ml-4 text-sm text-gray-500" id="search-results-count"></div>
            </div>

            <div class="bg-white shadow-md rounded-lg overflow-hidden">
                <table class="min-w-full text-left text-sm">
                    <thead class="bg-slate-100 border-b">
                        <tr>
                            <th class="px-6 py-3 font-bold text-gray-700 text-xs uppercase tracking-wider text-center">Type</th>
                            <th class="px-6 py-3 font-bold text-gray-700 text-xs uppercase tracking-wider text-center w-1/3">Subject</th>
                            <th class="px-6 py-3 font-bold text-gray-700 text-xs uppercase tracking-wider text-center">Status</th>
                            <th class="px-6 py-3 font-bold text-gray-700 text-xs uppercase tracking-wider text-center">Date Created</th>
                            <th class="px-6 py-3 font-bold text-gray-700 text-xs uppercase tracking-wider text-right">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="doc-list" class="divide-y divide-gray-200">
                        <tr><td colspan="5" class="px-6 py-4 text-center text-gray-500">Loading documents...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <div id="viewModal" class="fixed inset-0 bg-gray-900 bg-opacity-50 hidden flex items-center justify-center z-50">
        <div class="bg-white rounded-lg shadow-xl w-11/12 md:w-3/4 lg:w-1/2 max-h-[90vh] flex flex-col">
            <div class="px-6 py-4 border-b flex justify-between items-center bg-slate-50 rounded-t-lg">
                <h3 class="text-xl font-bold text-gray-800" id="modal-title">Document Title</h3>
                <button onclick="closeModal()" class="text-gray-500 hover:text-red-500 text-2xl font-bold">&times;</button>
            </div>
            
            <div class="p-6 overflow-y-auto flex-1 bg-white">
                <div class="mb-4">
                    <span class="text-sm font-bold text-gray-500 uppercase">Type:</span> 
                    <span id="modal-type" class="text-sm text-gray-800 ml-2"></span>
                </div>
                <hr class="mb-4">
                <div id="modal-content" class="prose max-w-none text-gray-800">
                </div>
            </div>

            <div class="px-6 py-4 border-t bg-slate-50 flex justify-end space-x-3 rounded-b-lg" id="modal-footer">
                <button onclick="closeModal()" class="bg-gray-300 hover:bg-gray-400 text-gray-800 px-4 py-2 rounded font-bold transition">Close</button>
            </div>
        </div>
    </div>

    <script>
        let loadedDocuments = [];
        let isCurrentUserHEA = false;

        // Helper function to shorten document types
        const getShortDocType = (type) => {
            const types = {
                'CERT_JUST': 'CERT/JUST',
                'MEMO_INTERNAL': 'MEMO (INT)',
                'MEMO_EXTERNAL': 'MEMO (EXT)',
                'PSO': 'PSO',
                'NOTICE_OF_MEETING': 'NOTICE',
                'ADVISORY': 'ADVISORY',
                'LETTER': 'LETTER'
            };
            return types[type] || type || '-';
        };

        // Render Table Function
        const renderTable = (documentsToRender) => {
            const tbody = document.getElementById('doc-list');
            const countLabel = document.getElementById('search-results-count');
            
            countLabel.innerText = `${documentsToRender.length} document${documentsToRender.length !== 1 ? 's' : ''} found`;

            if (!documentsToRender || documentsToRender.length === 0) {
                tbody.innerHTML = `<tr><td colspan="5" class="px-6 py-4 text-center text-gray-500 py-8">No documents match your search criteria.</td></tr>`;
                return;
            }

            tbody.innerHTML = documentsToRender.map(doc => {
                const docTitle = doc.title || (doc.content_data && doc.content_data.subject) || 'Untitled';
                const shortType = getShortDocType(doc.doc_type);
                const dateCreated = doc.created_at ? new Date(doc.created_at).toLocaleDateString() : 'N/A';
                
                return `
                <tr class="hover:bg-gray-50 transition">
                    <td class="px-6 py-4 text-gray-600 font-bold text-xs whitespace-nowrap text-center">${shortType}</td>
                    <td class="px-6 py-4 font-medium text-gray-900">${docTitle}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-center">
                        <span class="px-2.5 py-1 rounded border text-xs font-bold 
                            ${doc.status === 'APPROVED' ? 'bg-green-100 text-green-800 border-green-300' : 'bg-yellow-100 text-yellow-800 border-yellow-300'}">
                            ${doc.status || 'DRAFT'}
                        </span>
                    </td>
                    <td class="px-6 py-4 text-gray-500 text-sm whitespace-nowrap text-center">${dateCreated}</td>
                    <td class="px-6 py-4 text-right whitespace-nowrap">
                        <div class="flex items-center justify-end gap-1.5">
                            <button onclick="viewDoc('${doc.doc_id}')" class="text-gray-600 hover:text-gray-900 bg-gray-50 hover:bg-gray-100 border border-gray-200 px-2.5 py-1 rounded font-medium text-xs transition">
                                View
                            </button>
                            <button onclick="editDoc('${doc.doc_id}')" class="text-blue-600 hover:text-blue-800 bg-blue-50 hover:bg-blue-100 border border-blue-200 px-2.5 py-1 rounded font-medium text-xs transition">
                                Edit
                            </button>
                            <button onclick="duplicateDoc('${doc.doc_id}')" class="text-orange-600 hover:text-orange-800 bg-orange-50 hover:bg-orange-100 border border-orange-200 px-2.5 py-1 rounded font-medium text-xs transition">
                                Duplicate
                            </button>

                            ${isCurrentUserHEA && doc.status !== 'APPROVED' ? `
                                <button onclick="approveDoc('${doc.doc_id}')" class="text-green-600 hover:text-green-800 bg-green-50 hover:bg-green-100 border border-green-200 px-2.5 py-1 rounded font-medium text-xs transition">
                                    Approve
                                </button>
                                <button onclick="approveAndPrint('${doc.doc_id}')" class="text-purple-600 hover:text-purple-800 bg-purple-50 hover:bg-purple-100 border border-purple-200 px-2.5 py-1 rounded font-medium text-xs transition">
                                    Approve & Print
                                </button>
                            ` : ''}
                            
                            ${doc.status === 'APPROVED' ? `
                                <button onclick="window.location.href='print.html?doc_id=${doc.doc_id}'" class="text-indigo-600 hover:text-indigo-800 bg-indigo-50 hover:bg-indigo-100 border border-indigo-200 px-2.5 py-1 rounded font-medium text-xs transition">
                                    Print
                                </button>
                            ` : ''}
                        </div>
                    </td>
                </tr>
            `}).join('');
        };

        document.addEventListener('DOMContentLoaded', async () => {
            // 1. Check Authentication
            const { data: { session } } = await window.supabaseClient.auth.getSession();
            
            if (!session) {
                window.location.href = 'login.html';
                return;
            }

            // 2. Fetch User Profile to Check Role
            const { data: profile } = await window.supabaseClient
                .from('profiles')
                .select('role')
                .eq('id', session.user.id)
                .single();
            
            isCurrentUserHEA = profile?.role === 'HEA';

            document.getElementById('page-body').classList.remove('hidden');

            // 3. Fetch Documents
            const { data: documents, error } = await window.supabaseClient
                .from('documents')
                .select('*')
                .order('created_at', { ascending: false }); 

            if (error) {
                document.getElementById('doc-list').innerHTML = `<tr><td colspan="5" class="px-6 py-4 text-center text-red-500">Error: ${error.message}</td></tr>`;
                return;
            }

            // 4. Save and Render
            loadedDocuments = documents || [];
            renderTable(loadedDocuments);

            // 5. Initialize Comprehensive Deep Search
            const searchInput = document.getElementById('searchInput');
            
            searchInput.addEventListener('input', (e) => {
                const searchTerm = e.target.value.toLowerCase().trim();
                
                if (!searchTerm) {
                    renderTable(loadedDocuments);
                    return;
                }

                const searchWords = searchTerm.split(/\s+/);

                const filteredDocs = loadedDocuments.filter(doc => {
                    // Deeply stringify the ENTIRE document object (includes JSON body, TO, FROM, etc.)
                    // Also append the formatted date and short type so they match human-readable searches
                    const searchableString = `
                        ${JSON.stringify(doc)} 
                        ${doc.created_at ? new Date(doc.created_at).toLocaleDateString() : ''} 
                        ${getShortDocType(doc.doc_type)}
                    `.toLowerCase();

                    // Check if EVERY word typed by the user exists somewhere in that giant string
                    return searchWords.every(word => searchableString.includes(word));
                });

                renderTable(filteredDocs);
            });
        });

        // --- ACTION FUNCTIONS ---

        // View/Review Document in Modal
        window.viewDoc = (docId) => {
            const doc = loadedDocuments.find(d => d.doc_id === docId);
            if (!doc) return;

            document.getElementById('modal-title').innerText = doc.title || (doc.content_data && doc.content_data.subject) || 'Untitled Document';
            document.getElementById('modal-type').innerText = (doc.doc_type || 'Unknown').replace('_', ' ');
            
            let htmlContent = "<p class='text-gray-500 italic'>No content available.</p>";
            if (doc.content_data && doc.content_data.body) {
                htmlContent = doc.content_data.body;
            }
            document.getElementById('modal-content').innerHTML = htmlContent;

            const footer = document.getElementById('modal-footer');
            if (isCurrentUserHEA && doc.status !== 'APPROVED') {
                footer.innerHTML = `
                    <button onclick="closeModal()" class="bg-gray-200 hover:bg-gray-300 text-gray-800 px-4 py-2 rounded font-bold transition">Close</button>
                    <button onclick="editDoc('${doc.doc_id}')" class="bg-blue-500 hover:bg-blue-600 text-white px-4 py-2 rounded font-bold transition">Edit</button>
                    <button onclick="approveDoc('${doc.doc_id}')" class="bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded font-bold transition">Approve Document</button>
                `;
            } else {
                footer.innerHTML = `<button onclick="closeModal()" class="bg-gray-200 hover:bg-gray-300 text-gray-800 px-4 py-2 rounded font-bold transition">Close</button>`;
            }

            document.getElementById('viewModal').classList.remove('hidden');
        };

        window.closeModal = () => {
            document.getElementById('viewModal').classList.add('hidden');
        };

        // Redirect to Edit Page
        window.editDoc = (docId) => {
            window.location.href = `edit-document.html?doc_id=${docId}`;
        };

        // Duplicate Document
        window.duplicateDoc = async (docId) => {
            if (!confirm("Are you sure you want to duplicate this document? A new DRAFT copy will be created.")) return;

            const docToCopy = loadedDocuments.find(d => d.doc_id === docId);
            if (!docToCopy) return;

            const { data: { session } } = await window.supabaseClient.auth.getSession();
            
            // Deep copy the JSON data so modifications to the new one don't affect the old one
            let newContentData = null;
            if (docToCopy.content_data) {
                newContentData = JSON.parse(JSON.stringify(docToCopy.content_data));
            }

            const insertPayload = {
                title: docToCopy.title ? docToCopy.title + ' (COPY)' : 'COPY',
                doc_type: docToCopy.doc_type,
                content_data: newContentData,
                status: 'DRAFT',
                creator_id: session.user.id
            };

            const { error } = await window.supabaseClient
                .from('documents')
                .insert([insertPayload]);

            if (error) {
                alert("Error duplicating document: " + error.message);
            } else {
                location.reload(); 
            }
        };

        // Approve Status
        window.approveDoc = async (docId) => {
            if (!confirm("Are you sure you want to approve this document?")) return;
            
            const { error } = await window.supabaseClient
                .from('documents')
                .update({ status: 'APPROVED' })
                .eq('doc_id', docId);

            if (error) {
                alert("Error approving document: " + error.message);
            } else {
                alert("Document approved successfully!");
                location.reload(); 
            }
        };

        // Approve and Print
        window.approveAndPrint = async (docId) => {
            if (!confirm("Approve this document and proceed to print with E-Sign?")) return;
            
            const { error } = await window.supabaseClient
                .from('documents')
                .update({ status: 'APPROVED' })
                .eq('doc_id', docId);

            if (error) {
                alert("Error approving document: " + error.message);
                return;
            }
            
            window.location.href = `print.html?doc_id=${docId}`;
        };
    </script>
</body>
</html>
