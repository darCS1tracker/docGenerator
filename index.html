<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - DAR DMS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <script src="db.js"></script>
    <script src="sidebar.js"></script>
</head>
<body class="bg-gray-100 font-sans flex h-screen">

    <aside id="sidebar-container" class="w-64 bg-slate-900 text-white flex flex-col hidden md:flex"></aside>

    <main class="flex-1 overflow-y-auto">
        <header class="h-16 bg-white shadow-sm flex items-center px-8">
            <h2 class="text-lg font-semibold text-gray-800">Dashboard</h2>
        </header>
        
        <div class="p-8">
            <h1 class="text-2xl font-bold text-gray-900 mb-6">Welcome!</h1>
            <div class="bg-white rounded-lg shadow p-6 border-l-4 border-blue-500 max-w-sm">
                <h3 class="text-gray-500 text-sm font-medium uppercase">Total Documents</h3>
                <p id="total-docs" class="text-3xl font-bold text-gray-900 mt-2">Loading...</p>
            </div>
        </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const { count } = await window.supabaseClient.from('documents').select('*', { count: 'exact', head: true });
            document.getElementById('total-docs').innerText = count || 0;
        });
    </script>
</body>
</html>
