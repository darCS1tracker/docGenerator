<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Draft - DAR DMS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <script src="db.js"></script>
    <script src="sidebar.js"></script>
</head>
<body class="bg-gray-100 font-sans flex h-screen">

    <aside id="sidebar-container" class="w-64 bg-slate-900 text-white flex flex-col hidden md:flex"></aside>

    <main class="flex-1 overflow-y-auto p-8">
        <div class="max-w-3xl bg-white p-8 shadow-md rounded-lg mx-auto">
            <h2 class="text-2xl font-bold mb-6 text-gray-800">Draft New Document</h2>
            <form id="draft-form" class="space-y-6">
                <div>
                    <label class="block text-sm font-medium text-gray-700">Document Type</label>
                    <select id="doc_type" class="mt-1 block w-full border-gray-300 rounded-md p-2 border">
                        <option value="MEMO">Memorandum</option>
                        <option value="PSO">PSO</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Title</label>
                    <input type="text" id="title" required class="mt-1 block w-full border-gray-300 rounded-md p-2 border" />
                </div>
                <div class="flex justify-end">
                    <button type="submit" class="bg-blue-600 text-white font-bold py-2 px-6 rounded">Submit</button>
                </div>
            </form>
        </div>
    </main>

    <script>
        document.getElementById('draft-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const docData = {
                title: document.getElementById('title').value,
                doc_type: document.getElementById('doc_type').value,
                status: 'PENDING_HEA_REVIEW',
                content_data: {}
            };
            await window.supabaseClient.from('documents').insert([docData]);
            alert("Submitted!");
            e.target.reset();
        });
    </script>
</body>
</html>
