<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify - DAR DMS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="db.js"></script>
</head>
<body class="bg-gray-100 font-sans flex items-center justify-center min-h-screen p-4">

    <div class="bg-white rounded-2xl shadow-xl max-w-sm w-full p-8 text-center" id="verification-card">
        <div id="loading-state">
            <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-blue-600 mx-auto mb-4"></div>
            <h2 class="text-lg font-bold text-gray-700">Checking Document...</h2>
            <p class="text-xs text-gray-500 mt-2">Connecting to DAR Secure DB</p>
        </div>

        <div id="result-state" class="hidden"></div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const urlParams = new URLSearchParams(window.location.search);
            const docId = urlParams.get('doc_id');
            const resultDiv = document.getElementById('result-state');
            const loadingDiv = document.getElementById('loading-state');

            // Brief delay to allow users to register the loading screen
            setTimeout(async () => {
                if (!docId) {
                    showError("Invalid QR Code", "No Document ID found.");
                    return;
                }

                try {
                    const { data: doc, error } = await window.supabaseClient
                        .from('documents')
                        .select('title, doc_type, status')
                        .eq('doc_id', docId)
                        .single();

                    loadingDiv.classList.add('hidden');
                    resultDiv.classList.remove('hidden');

                    if (error || !doc) {
                        showError("Not Found", "This document does not exist in the DAR system.");
                    } else if (doc.status !== 'APPROVED') {
                        showError("Unofficial Document", "This document exists but has NOT been approved.");
                    } else {
                        showSuccess(doc);
                    }
                } catch (err) {
                    showError("Connection Error", "Cannot connect to server.");
                }
            }, 800);

            function showSuccess(doc) {
                // Format doc type (e.g., 'NOTICE_OF_MEETING' -> 'NOTICE OF MEETING')
                const typeName = (doc.doc_type || 'Document').replace(/_/g, ' ');

                resultDiv.innerHTML = `
                    <div class="bg-green-100 text-green-600 rounded-full h-16 w-16 flex items-center justify-center mx-auto mb-4 shadow-sm">
                        <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>
                    </div>
                    <h2 class="text-xl font-black text-green-700 mb-1">VERIFIED OFFICIAL</h2>
                    <p class="text-xs text-gray-500 font-medium mb-6">DAR - Camarines Sur 1</p>
                    
                    <div class="bg-gray-50 border border-gray-100 rounded-lg p-5 text-left shadow-inner">
                        <p class="text-[10px] text-gray-400 uppercase font-bold tracking-wider mb-1">Document Type</p>
                        <p class="text-sm font-bold text-gray-800 mb-4">${typeName}</p>
                        
                        <p class="text-[10px] text-gray-400 uppercase font-bold tracking-wider mb-1">Title / Subject</p>
                        <p class="text-sm font-bold text-gray-800 leading-tight">${doc.title || 'Untitled'}</p>
                    </div>
                    
                    <p class="text-[10px] text-gray-400 mt-6">Scanned on ${new Date().toLocaleString()}</p>
                `;
            }

            function showError(title, message) {
                loadingDiv.classList.add('hidden');
                resultDiv.classList.remove('hidden');
                
                resultDiv.innerHTML = `
                    <div class="bg-red-100 text-red-600 rounded-full h-16 w-16 flex items-center justify-center mx-auto mb-4 shadow-sm">
                        <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M6 18L18 6M6 6l12 12"></path></svg>
                    </div>
                    <h2 class="text-xl font-black text-red-700 mb-2">${title}</h2>
                    <p class="text-gray-600 text-sm mb-6">${message}</p>
                `;
            }
        });
    </script>
</body>
</html>
